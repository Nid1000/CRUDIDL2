version: "3.9"

services:
  db:
    image: mariadb:10.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: demo_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./demo_db.sql:/docker-entrypoint-initdb.d/demo_db.sql:ro

  backend:
    build:
      context: .
      dockerfile: BACKEND/Mvc.Api/Dockerfile
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__demoDb: "Server=db;Port=3306;Database=demo_db;Uid=root;Pwd=;SslMode=None;AllowPublicKeyRetrieval=True;"
    ports:
      - "5133:5133"

  frontend:
    build:
      context: FRONTEND/crud_angular
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  db_data:

